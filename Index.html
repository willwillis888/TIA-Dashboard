<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community Execution Profile</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:           #190c19;
    --bg2:          #1f0f1f;
    --bg3:          #261526;
    --bg4:          #2e1a2e;
    --gold:         #c6a96b;
    --gold-bright:  #d9be88;
    --gold-dim:     #9a7e4f;
    --gold-glow:    rgba(198,169,107,0.10);
    --gold-border:  rgba(198,169,107,0.32);
    --text:         #eedfc0;
    --text-dim:     #7a6045;
    --radius:       5px;
    --navy:         #0d2137;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 13px;
    line-height: 1.4;
    min-height: 100vh;
  }
  header {
    background: var(--navy);
    padding: 10px 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 20px rgba(0,0,0,0.7);
    border-bottom: 2px solid var(--gold);
  }
  .hdr-left { display: flex; align-items: center; gap: 14px; }
  .tia-mark { display: flex; align-items: center; }
  .tia-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 30px; color: #ffffff; letter-spacing: 3px; line-height: 1;
  }
  .tia-chevron {
    width: 0; height: 0;
    border-top: 10px solid transparent;
    border-bottom: 10px solid transparent;
    border-left: 16px solid #ffffff;
    margin-left: 4px;
  }
  .hdr-divider {
    width: 1px; height: 24px;
    background: rgba(198,169,107,0.45);
  }
  header h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px; font-weight: 600;
    color: var(--gold); letter-spacing: 1.5px; text-transform: uppercase;
  }
  .hdr-right {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
    color: rgba(198,169,107,0.45); text-transform: uppercase;
  }
  .live-bar {
    background: var(--bg2);
    border-bottom: 1px solid var(--gold-border);
    padding: 5px 20px;
    display: flex; align-items: center; justify-content: space-between;
    font-size: 10.5px; color: var(--text-dim);
  }
  .live-ind { display: flex; align-items: center; gap: 7px; }
  .live-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--gold); box-shadow: 0 0 6px var(--gold);
    animation: blink 2.5s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }
  .btn-refresh {
    background: none; border: 1px solid var(--gold-border);
    color: var(--gold-dim); padding: 2px 11px;
    border-radius: 3px; font-size: 10px;
    font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
    letter-spacing: 0.8px; text-transform: uppercase; cursor: pointer;
    transition: all .2s;
  }
  .btn-refresh:hover { border-color: var(--gold); color: var(--gold); }
  #debug {
    display: none; margin: 10px 20px;
    background: #100010; border: 1px solid #c44;
    border-radius: 4px; padding: 10px 14px;
    font-family: monospace; font-size: 11px; color: #f88;
    line-height: 1.7; max-height: 160px; overflow-y: auto;
  }
  #debug strong { color: #f44; display: block; margin-bottom: 4px; }
  main { padding: 13px 20px 20px; display: grid; gap: 11px; }
  .row-kpi    { display: grid; grid-template-columns: 1.5fr 0.9fr 0.9fr 0.9fr 2fr; gap: 10px; }
  .row-charts { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .row-bot    { display: grid; grid-template-columns: 1fr 1.65fr; gap: 10px; }
  .card {
    background: var(--bg2);
    border: 1px solid var(--gold-border);
    border-radius: var(--radius);
    padding: 11px 14px;
    position: relative; overflow: hidden;
    animation: fadeUp .4s ease both;
  }
  .card::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, var(--gold-glow) 0%, transparent 55%);
    pointer-events: none;
  }
  .card.hi { border-color: var(--gold); }
  .card.hi::after {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--gold-dim), var(--gold-bright), var(--gold-dim));
  }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(7px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .row-kpi .card:nth-child(1){animation-delay:.04s}
  .row-kpi .card:nth-child(2){animation-delay:.09s}
  .row-kpi .card:nth-child(3){animation-delay:.14s}
  .row-kpi .card:nth-child(4){animation-delay:.19s}
  .row-kpi .card:nth-child(5){animation-delay:.24s}
  .row-charts .card:nth-child(1){animation-delay:.29s}
  .row-charts .card:nth-child(2){animation-delay:.34s}
  .row-bot .card:nth-child(1){animation-delay:.39s}
  .row-bot .card:nth-child(2){animation-delay:.44s}
  .lbl {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px; font-weight: 700;
    color: var(--gold-dim);
    text-transform: uppercase; letter-spacing: 0.9px;
    margin-bottom: 6px;
  }
  .kpi-big {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px; line-height: .92; letter-spacing: 1px; color: var(--text);
  }
  .kpi-med {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 40px; line-height: .92; letter-spacing: 1px; color: var(--text);
  }
  .peg-val {
    font-size: 13px; font-weight: 500;
    color: var(--text); line-height: 1.5; margin-top: 4px;
  }
  .ch { position: relative; }
  .rec-sub {
    font-size: 11.5px; font-weight: 600; color: var(--text);
    border-bottom: 1px solid var(--gold-border);
    padding-bottom: 7px; margin-bottom: 10px;
  }
  .rec-list { display: flex; flex-direction: column; gap: 9px; }
  .rec-row { display: flex; gap: 9px; align-items: flex-start; }
  .rec-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--gold); flex-shrink: 0;
    margin-top: 4px;
    box-shadow: 0 0 5px rgba(198,169,107,.35);
  }
  .rec-row p { font-size: 12px; line-height: 1.6; }
  .rec-row strong { color: var(--gold-bright); }
  footer {
    text-align: right; padding: 8px 20px 16px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 700;
    color: var(--gold-dim); letter-spacing: 1.5px; text-transform: uppercase;
  }
  #loader {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; z-index: 999; transition: opacity .5s;
  }
  .ld-word {
    font-family: 'Bebas Neue', sans-serif; font-size: 52px;
    color: var(--gold); letter-spacing: 6px;
    animation: blink 1.4s ease-in-out infinite;
  }
  .ld-track { width: 160px; height: 2px; background: var(--bg4); border-radius: 2px; overflow: hidden; }
  .ld-fill  { height: 100%; background: var(--gold); animation: fill 2s ease-in-out forwards; }
  @keyframes fill { 0%{width:0} 60%{width:65%} 100%{width:100%} }
  .ld-txt {
    font-family: 'Barlow Condensed', sans-serif; font-size: 10px;
    letter-spacing: 2.5px; color: var(--text-dim); text-transform: uppercase;
  }
</style>
</head>
<body>

<div id="loader">
  <div class="ld-word">TIA</div>
  <div class="ld-track"><div class="ld-fill"></div></div>
  <div class="ld-txt">Fetching live data…</div>
</div>

<header>
  <div class="hdr-left">
    <div class="tia-mark">
      <span class="tia-text">TIA</span>
      <div class="tia-chevron"></div>
    </div>
    <div class="hdr-divider"></div>
    <h1>Community Execution Profile</h1>
  </div>
  <div class="hdr-right">Live Dashboard</div>
</header>

<div class="live-bar">
  <div class="live-ind">
    <div class="live-dot"></div>
    <span id="ts">Connecting…</span>
  </div>
  <button class="btn-refresh" onclick="loadAll()">↻ Refresh</button>
</div>

<div id="debug"><strong>⚠ Connection Issue</strong><span id="dbg-msg"></span></div>

<main>
  <div class="row-kpi">
    <div class="card">
      <div class="lbl">Community Execution Score /100</div>
      <div class="kpi-big" id="v-score">—</div>
    </div>
    <div class="card">
      <div class="lbl">Progress Delta</div>
      <div class="kpi-med" id="v-delta">—</div>
    </div>
    <div class="card">
      <div class="lbl">Members Analysed</
